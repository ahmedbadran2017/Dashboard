{%- block head %}
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#131417" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Justyol Ops">
<link rel="manifest" href="/assets/ops_dashboard/manifest.webmanifest">
<link rel="apple-touch-icon" href="/assets/ops_dashboard/icons/icon-192.png">
<title>Justyol Ops Dashboard</title>
{{ include_style("ops_dashboard.bundle.css") }}
{%- endblock %}

{%- block page_content %}
<div id="app"></div>
{%- endblock %}

{%- block script %}
<script>
  // Expose the session CSRF token so the SPA's POST /api/method calls are
  // accepted (Frappe rejects POSTs without a matching token). Without this every
  // data call 400s and the dashboard renders empty. Token comes from ops.py's
  // get_context (frappe.sessions.get_csrf_token) — page is no_cache per session.
  window.csrf_token = "{{ csrf_token }}";
</script>
<script>
  // Register the service worker for offline shell + installability.
  // The worker is served from the site root (/sw.js via Frappe www/) so it can
  // claim the /ops/ scope — a worker under /assets/ cannot without a header
  // Frappe does not send. A registered SW is also what lets Chrome/Android fire
  // the install prompt.
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () {
      navigator.serviceWorker.register("/sw.js", { scope: "/ops/" })
        .catch(function (e) { console.warn("SW registration failed", e); });
    });
  }
</script>
{{ include_script("ops_dashboard.bundle.js") }}
{%- endblock %}
